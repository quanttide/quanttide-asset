spec_version: 0.0.1
version: 0.1.0

discovery:
  type_map:
    .md: docs
    .txt: docs
    .pdf: docs
    .py: code
    .js: code
    .ts: code
    .yaml: config
    .yml: config
    .json: config
    .toml: config
    .csv: data
    .sqlite: data
    .lock: config

  ignore_files:
    - .gitignore
    - .python-version
    - uv.lock

  ignore_dirs:
    - .venv
    - data
    - .git
    - __pycache__
    - .ruff_cache
    - .pytest_cache

assets:
  pyproject:
    title: 项目配置
    type: config
    category: project
    path: pyproject.toml
    description: Python项目配置文件

  readme:
    title: 项目文档
    type: docs
    category: readme
    path: README.md
    description: 项目说明文档

  app:
    title: 应用代码
    type: code
    category: app
    path: app
    description: 资产发现程序核心模块

  docs:
    title: 开发者文档
    type: docs
    category: dev
    path: docs
    description: 资产发现程序开发者文档
